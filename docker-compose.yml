services:
  web:
    build:
      context: .                    # ต้องเป็น root เพื่อให้ Dockerfile เห็นทั้ง backend/ และ frontend/
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app       # แก้โค้ด backend เห็นผลทันที (--reload)
      - ./frontend:/app/frontend     # แก้ไฟล์ frontend เห็นผลทันที ไม่ต้อง build ใหม่
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

